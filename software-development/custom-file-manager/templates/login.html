<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网盘登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .box {
            background: white; border-radius: 16px; padding: 40px;
            width: 100%; max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
        .sub { color: #999; font-size: 13px; margin-bottom: 32px; }
        .input-box {
            width: 100%; padding: 14px 16px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 18px; text-align: center; letter-spacing: 4px;
            outline: none; transition: border-color 0.3s;
        }
        .input-box:focus { border-color: #667eea; }
        .btn {
            width: 100%; padding: 14px; margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .error {
            background: #fee; color: #c00; padding: 10px;
            border-radius: 8px; margin-bottom: 16px; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">☁️</div>
        <h1>我的网盘</h1>
        <p class="sub">输入秘钥以访问</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
            <input type="text" name="key" class="input-box"
                   placeholder="请输入秘钥" required autofocus
                   autocomplete="off" inputmode="numeric">
            <button type="submit" class="btn">进入网盘</button>
        </form>
    </div>
</body>
</html>
